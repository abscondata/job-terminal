<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Terminal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0b;--row:#141417;--row-alt:#111114;--row-hover:#1a1a1f;
  --text:#e8e5e0;--sub:#8a8880;--dim:#55524c;
  --gold:#c9a96e;--gold-dim:#a08650;--gold-faint:rgba(201,169,110,.08);
  --blue:#7a9fc0;--blue-bg:rgba(122,159,192,.12);
  --risk:#d4745a;--fit:#6fcf97;
  --green-bg:rgba(22,101,52,.15);--green:#6fcf97;
  --amber-bg:rgba(146,64,14,.15);--amber:#f59e0b;
  --red-bg:rgba(153,27,27,.12);--red:#ef4444;
  --indigo-bg:rgba(55,48,163,.12);--indigo:#818cf8;
  --r:8px;
}
html,body{background:var(--bg);color:var(--text);font:13px/1.45 system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit}

.header{padding:18px 16px 10px;text-align:center}
.brand{font:600 12px/1 system-ui;letter-spacing:.2em;text-transform:uppercase;color:var(--text)}
.brand-line{width:36px;height:2px;background:var(--gold);margin:7px auto 5px;border-radius:1px}
.header-sub{font-size:11px;color:var(--dim)}

/* Lane tabs */
.lane-tabs{display:flex;justify-content:center;gap:0;border-bottom:1px solid rgba(255,255,255,.06)}
.lane-tab{
  padding:10px 24px;font:700 11px system-ui;letter-spacing:.06em;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;text-transform:uppercase;background:none;border-left:none;border-right:none;border-top:none;border-radius:0;
}
.lane-tab:hover{color:var(--sub)}
.lane-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.lane-tab .cnt{
  display:inline-block;margin-left:5px;padding:1px 6px;border-radius:999px;
  background:rgba(255,255,255,.06);font:600 10px system-ui;color:var(--dim);
}
.lane-tab.on .cnt{background:var(--gold-faint);color:var(--gold)}

/* Sub-tabs for saved */
.sub-tabs{display:flex;justify-content:center;gap:4px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.sub-tab{
  padding:4px 12px;border-radius:999px;border:none;
  background:rgba(255,255,255,.04);color:var(--dim);
  font:600 10px system-ui;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;
}
.sub-tab:hover{color:var(--sub)}
.sub-tab.on{background:var(--gold-faint);color:var(--gold)}

/* Composable filters */
.filters{
  position:sticky;top:0;z-index:10;background:rgba(10,10,11,.95);backdrop-filter:blur(8px);
  padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.flabel{font:700 9px system-ui;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-right:2px}
.chip{
  padding:4px 10px;border-radius:999px;border:none;
  background:rgba(255,255,255,.04);color:var(--dim);
  font:600 10px system-ui;letter-spacing:.03em;
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.chip:hover{background:rgba(255,255,255,.07);color:var(--sub)}
.chip.on{background:var(--gold-faint);color:var(--gold)}
.sep{width:1px;height:16px;background:rgba(255,255,255,.06);margin:0 2px}
.search{
  padding:5px 10px;border-radius:var(--r);border:none;
  background:rgba(255,255,255,.04);color:var(--text);font:12px system-ui;
  outline:none;min-width:80px;flex:1;max-width:180px;
}
.search:focus{background:rgba(255,255,255,.07)}
.search::placeholder{color:var(--dim)}

.summary{padding:5px 14px;font-size:10px;color:var(--dim);letter-spacing:.02em}
.wrap{padding:0 8px 80px;max-width:1100px;margin:0 auto}

/* Cards */
.card{
  padding:12px 14px;margin-bottom:2px;cursor:pointer;transition:background .1s;
  border-bottom:1px solid rgba(255,255,255,.025);
}
.card:hover{background:var(--row-hover)}
.card.r0{background:var(--row)}.card.r1{background:var(--row-alt)}
.card-top{display:flex;align-items:flex-start;gap:10px}
.card-main{flex:1;min-width:0}
.card-title{font-weight:600;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-company{color:var(--gold);font-weight:600;font-size:12px;margin-top:1px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.tag{display:inline-block;padding:1px 7px;border-radius:999px;font:600 9px/1.7 system-ui;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.t-city{background:rgba(122,159,192,.1);color:var(--blue)}
.t-ft{background:var(--green-bg);color:var(--green)}
.t-intern{background:var(--amber-bg);color:var(--amber)}
.t-contract{background:var(--red-bg);color:var(--red)}
.t-alt{background:var(--indigo-bg);color:var(--indigo)}
.t-func{background:rgba(139,92,246,.08);color:#a78bfa}
.t-world{background:var(--gold-faint);color:var(--gold-dim)}
.t-saved{background:var(--green-bg);color:var(--green)}
.t-maybe{background:var(--amber-bg);color:var(--amber)}
.t-rejected{background:var(--red-bg);color:var(--red)}

.card-reason{font-size:12px;color:var(--sub);margin-top:5px;font-style:italic}
.card-risk{font-size:11px;color:var(--risk);margin-top:3px;opacity:.85}
.card-comp{font-size:11px;color:var(--green);margin-top:2px}
.card-score{font:600 11px system-ui;color:var(--dim);min-width:30px;text-align:right}
.card-open{font-size:11px}

/* Detail panel */
.detail{display:none;padding:10px 14px 14px 20px;background:var(--row-hover);border-bottom:1px solid rgba(255,255,255,.04)}
.card.expanded+.detail{display:block}
.d-section{margin-bottom:8px}
.d-label{font:700 9px system-ui;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.d-text{font-size:12px;line-height:1.45;color:var(--sub)}
.d-text.risk{color:var(--risk)}.d-text.fit{color:var(--fit)}
.d-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--gold-dim);background:transparent;color:var(--gold);font:600 11px system-ui;cursor:pointer;transition:all .12s}
.btn:hover{background:var(--gold-faint)}
.btn.filled{background:var(--gold);color:#0a0a0b;border-color:var(--gold)}
.btn.filled:hover{background:var(--gold-dim)}
.btn.ghost{border-color:transparent;color:var(--dim)}
.btn.ghost:hover{color:var(--sub)}
.btn.rm{border-color:var(--risk);color:var(--risk)}
.btn.rm:hover{background:rgba(212,116,90,.08)}

.empty{padding:50px 20px;text-align:center;color:var(--dim);font-size:12px}
.show-all-wrap{text-align:center;padding:16px}
.show-all-btn{padding:6px 16px;border-radius:var(--r);border:1px solid var(--dim);background:transparent;color:var(--dim);font:600 11px system-ui;cursor:pointer}
.show-all-btn:hover{color:var(--sub);border-color:var(--sub)}
.t-comp{background:rgba(111,207,151,.1);color:var(--green);font-variant-numeric:tabular-nums}

@media(max-width:600px){
  .filters{padding:6px 8px;gap:3px}
  .search{max-width:none;min-width:60px}
  .card-title{font-size:13px}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">Job Terminal</div>
  <div class="brand-line"></div>
  <div class="header-sub"><span id="hDate">-</span> &middot; <span id="hCount">0</span> roles</div>
</div>

<div class="lane-tabs">
  <button class="lane-tab on" data-lane="compliance">Compliance &amp; Ops <span class="cnt" id="cntComp">0</span></button>
  <button class="lane-tab" data-lane="fashion">Fashion &amp; Direction <span class="cnt" id="cntFash">0</span></button>
  <button class="lane-tab" data-lane="saved">Saved <span class="cnt" id="cntSaved">0</span></button>
</div>

<div class="sub-tabs" id="subTabs" style="display:none">
  <button class="sub-tab on" data-sub="all">All</button>
  <button class="sub-tab" data-sub="Applied">Applied</button>
  <button class="sub-tab" data-sub="Saved">Saved</button>
  <button class="sub-tab" data-sub="Maybe">Maybe</button>
  <button class="sub-tab" data-sub="Rejected">Rejected</button>
</div>

<div class="filters" id="filterBar">
  <span class="flabel">City</span>
  <span id="cityChips"></span>
  <div class="sep"></div>
  <span class="flabel">Type</span>
  <span id="typeChips"></span>
  <div class="sep"></div>
  <input class="search" id="fSearch" placeholder="Search..." />
</div>

<div class="summary" id="summ"></div>
<div class="wrap" id="wrap"></div>

<script>
var JOBS=[],META={},SAVED=[],SI={};
var LANE="compliance",SUB="all",EXP=null,DISM={};
var SEARCH="";
var SHOW_ALL=false;
var COMP_FLOOR=35,FASH_FLOOR=45;
var LS_S="jobengine_saved_v2";

var CITIES_ON=new Set();
var TYPES_ON=new Set();

var COMP_KW=["compliance","regulatory","aml","kyc","risk","securities","broker-dealer","broker dealer","licensing","registration","account opening","onboarding","finra","financial crimes","bsa","anti-money","sanctions","trade surveillance"];
var COMP_SRC={"nyc_compliance":1};

function e(s){return String(s==null?"":s).replace(/[&<>"']/g,function(m){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m]||m})}

function isComp(j){
  // Primary: use the tab field set by export_static.py
  if(j.tab==="compliance") return true;
  if(j.tab==="fashion") return false;
  // Fallback for old data without tab field
  if(COMP_SRC[j.source]) return true;
  var hay=((j.title||"")+" "+(j.function_family||"")+" "+(j.lane||"")).toLowerCase();
  for(var i=0;i<COMP_KW.length;i++){if(hay.indexOf(COMP_KW[i])>=0)return true}
  return false;
}

function typeLabel(j){
  var t=(j.type||"Full-Time");
  if(t==="Intern")return"Intern";
  if(t==="Alternance")return"Alternance";
  if(t==="Contract")return"Contract";
  return"Full-Time";
}
function typeTag(t){
  if(t==="Full-Time")return'<span class="tag t-ft">Full-Time</span>';
  if(t==="Intern")return'<span class="tag t-intern">Intern</span>';
  if(t==="Contract")return'<span class="tag t-contract">Contract</span>';
  if(t==="Alternance")return'<span class="tag t-alt">Alternance</span>';
  return'<span class="tag">'+e(t)+'</span>';
}
function typeOrder(j){
  var t=typeLabel(j);
  if(t==="Full-Time")return 0;if(t==="Contract")return 1;if(t==="Intern")return 2;if(t==="Alternance")return 2;return 3;
}

function cityLabel(j){return j.city||"Other"}

function reasonLine(j){
  // Both tabs now have pre-built one_liner from export
  if(j.one_liner) return j.one_liner;
  // Fallback
  var parts=[];
  var company=j.company_clean||j.company||"";
  if(company)parts.push(company);
  if(j.city)parts.push(j.city);
  return parts.join(", ")||"";
}

function shortLoc(loc){
  if(!loc)return"";
  var s=loc.replace(/,?\s*(?:Île-de-France|France|United States|USA|US)\s*$/i,"").trim();
  s=s.replace(/\s*\(\d+\)\s*$/,"").trim();
  s=s.replace(/^(?:Hybrid work in|Remote in)\s*/i,"").trim();
  if(s.length>25)s=s.substring(0,23)+"\u2026";
  return s;
}

var INTERNAL_RE=/\b(bridge upside|borderline bridge|real bridge|prettier slop|mixed case|slop)\b/i;
function cleanText(s){if(!s)return"";return s.replace(INTERNAL_RE,"").replace(/\s{2,}/g," ").trim()}

// --- Saved persistence ---
function loadS(){try{SAVED=JSON.parse(localStorage.getItem(LS_S)||"[]")}catch(x){SAVED=[]}SI={};for(var i=0;i<SAVED.length;i++)SI[SAVED[i].fingerprint]=1;document.getElementById("cntSaved").textContent=SAVED.length}
function saveS(){localStorage.setItem(LS_S,JSON.stringify(SAVED));loadS()}
function saveJ(fp){for(var i=0;i<JOBS.length;i++){if(JOBS[i].fingerprint===fp&&!SI[fp]){SAVED.push({fingerprint:fp,saved_at:new Date().toISOString(),bucket:"Saved",job:JOBS[i]});break}}saveS();render()}
function rmSaved(fp){SAVED=SAVED.filter(function(s){return s.fingerprint!==fp});saveS();render()}
function setSavedBucket(fp,bucket){for(var i=0;i<SAVED.length;i++){if(SAVED[i].fingerprint===fp){SAVED[i].bucket=bucket;break}}saveS();render()}

// --- Filter chips ---
function buildChips(id, values, activeSet){
  var el=document.getElementById(id);el.innerHTML="";
  values.forEach(function(v){
    var c=document.createElement("span");
    c.className="chip"+(activeSet.size===0||activeSet.has(v)?" on":"");
    c.textContent=v;
    c.addEventListener("click",function(){
      if(activeSet.has(v))activeSet.delete(v);else activeSet.add(v);
      if(activeSet.size===values.length)activeSet.clear();
      buildChips(id,values,activeSet);render();
    });
    el.appendChild(c);
  });
}

function refreshChips(pool){
  var cities=new Set(),types=new Set();
  pool.forEach(function(j){cities.add(cityLabel(j));types.add(typeLabel(j))});
  buildChips("cityChips",Array.from(cities).sort(),CITIES_ON);
  buildChips("typeChips",Array.from(types).sort(),TYPES_ON);
}

function passFilter(j){
  if(CITIES_ON.size>0&&!CITIES_ON.has(cityLabel(j)))return false;
  if(TYPES_ON.size>0&&!TYPES_ON.has(typeLabel(j)))return false;
  if(SEARCH){
    var hay=((j.company_clean||j.company||"")+" "+(j.title||"")+" "+(j.lane||"")+" "+(j.city||"")+" "+(j.function_family||"")).toLowerCase();
    if(hay.indexOf(SEARCH)<0)return false;
  }
  if(DISM[j.fingerprint])return false;
  return true;
}

// --- Card rendering ---
function savedBucketOf(fp){
  for(var i=0;i<SAVED.length;i++){if(SAVED[i].fingerprint===fp)return SAVED[i].bucket||"Saved"}
  return"";
}

function cardHTML(j,z,ctx){
  var fp=j.fingerprint;
  var isE=EXP===fp;
  var wt=typeLabel(j);
  var reason=reasonLine(j);
  var score=j.score||0;
  var sb=savedBucketOf(fp);
  var sbTag="";
  if(sb==="Applied")sbTag='<span class="tag t-saved">Applied</span>';
  else if(sb==="Saved")sbTag='<span class="tag t-saved">Saved</span>';
  else if(sb==="Maybe")sbTag='<span class="tag t-maybe">Maybe</span>';
  else if(sb==="Rejected")sbTag='<span class="tag t-rejected">Rejected</span>';

  var h='<div class="card r'+(z%2)+(isE?" expanded":"")+'" onclick="tog(\''+e(fp)+'\')">';
  h+='<div class="card-top">';
  h+='<div class="card-main">';
  h+='<div class="card-title">'+e(j.title)+'</div>';
  h+='<div class="card-company">'+e(j.company_clean||j.company)+'</div>';
  h+='<div class="card-tags">';
  h+='<span class="tag t-city">'+e(j.city||shortLoc(j.location))+'</span>';
  h+=typeTag(wt);
  var compStr=j.compensation||"";
  if(compStr)h+='<span class="tag t-comp">'+e(compStr)+'</span>';
  if(j.function_family)h+='<span class="tag t-func">'+e(j.function_family)+'</span>';
  if(j.world_simple&&j.world_simple!=="Other")h+='<span class="tag t-world">'+e(j.world_simple)+'</span>';
  h+=sbTag;
  h+='</div>';
  h+='<div class="card-reason">'+e(reason)+'</div>';
  var riskStr=j.risk||"";
  if(riskStr)h+='<div class="card-risk">'+e(riskStr)+'</div>';
  h+='</div>';
  h+='<div>';
  if(j.url)h+='<a class="card-open" href="'+e(j.url)+'" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Open</a>';
  if(score)h+='<div class="card-score">'+score+'</div>';
  h+='</div>';
  h+='</div></div>';

  // Detail panel
  h+='<div class="detail">';
  var pl=cleanText(j.path_logic||j.one_liner);
  if(pl&&pl.length>10)h+='<div class="d-section"><div class="d-label">Why this matters</div><div class="d-text fit">'+e(pl)+'</div></div>';
  var mr=cleanText(j.main_risk);
  if(mr&&mr.length>5)h+='<div class="d-section"><div class="d-label">Main risk</div><div class="d-text risk">'+e(mr)+'</div></div>';
  if(j.compensation)h+='<div class="d-section"><div class="d-label">Compensation</div><div class="d-text">'+e(j.compensation)+'</div></div>';
  h+='<div class="d-actions">';
  if(j.url)h+='<a class="btn filled" href="'+e(j.url)+'" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Open</a>';
  if(ctx==="saved"){
    h+='<button class="btn" onclick="event.stopPropagation();setSavedBucket(\''+e(fp)+'\',\'Applied\')">Mark Applied</button>';
    h+='<button class="btn ghost" onclick="event.stopPropagation();setSavedBucket(\''+e(fp)+'\',\'Maybe\')">Maybe</button>';
    h+='<button class="btn rm" onclick="event.stopPropagation();rmSaved(\''+e(fp)+'\')">Remove</button>';
  }else{
    if(!SI[fp])h+='<button class="btn" onclick="event.stopPropagation();saveJ(\''+e(fp)+'\')">Save</button>';
    else h+='<button class="btn" style="opacity:.3;cursor:default" onclick="event.stopPropagation()">Saved</button>';
    h+='<button class="btn ghost" onclick="event.stopPropagation();dismiss(\''+e(fp)+'\')">Dismiss</button>';
  }
  h+='</div></div>';

  return h;
}

// --- Main render ---
function render(){
  var wrap=document.getElementById("wrap");
  var subEl=document.getElementById("subTabs");
  var filterBar=document.getElementById("filterBar");

  // Pools (apply score floors for counts)
  var compAll=JOBS.filter(isComp);
  var fashAll=JOBS.filter(function(j){return!isComp(j)});
  var compVisible=compAll.filter(function(j){return j.score>=COMP_FLOOR});
  var fashVisible=fashAll.filter(function(j){return j.score>=FASH_FLOOR});
  document.getElementById("cntComp").textContent=compVisible.length;
  document.getElementById("cntFash").textContent=fashVisible.length;

  var list=[];
  var ctx="jobs";
  var hiddenCount=0;

  if(LANE==="compliance"||LANE==="fashion"){
    subEl.style.display="none";
    filterBar.style.display="flex";
    var isComp_=LANE==="compliance";
    var pool=isComp_?compAll:fashAll;
    var floor=isComp_?COMP_FLOOR:FASH_FLOOR;

    // Apply score floor unless SHOW_ALL
    var filtered=SHOW_ALL?pool:pool.filter(function(j){return j.score>=floor});
    hiddenCount=pool.length-pool.filter(function(j){return j.score>=floor}).length;

    refreshChips(filtered);
    list=filtered.filter(passFilter);
    // Sort by score desc (secondary sort baked into data)
    list.sort(function(a,b){return(b.score||0)-(a.score||0)});
  }else{
    subEl.style.display="flex";
    filterBar.style.display="none";
    ctx="saved";
    list=SAVED.map(function(s){var j=Object.assign({},s.job);j._bucket=s.bucket||"Saved";return j});
    if(SUB!=="all"){list=list.filter(function(j){return j._bucket===SUB})}
  }

  document.getElementById("summ").textContent="Showing "+list.length+" role"+(list.length===1?"":"s");

  if(!list.length){
    wrap.innerHTML='<div class="empty">No roles match your filters.</div>';
    return;
  }

  var html="";
  for(var i=0;i<list.length;i++){
    html+=cardHTML(list[i],i,ctx);
  }
  // Show all toggle for compliance/fashion tabs
  if(!SHOW_ALL&&hiddenCount>0&&ctx==="jobs"){
    html+='<div class="show-all-wrap"><button class="show-all-btn" onclick="SHOW_ALL=true;render()">Show '+hiddenCount+' lower-scored roles</button></div>';
  }else if(SHOW_ALL&&hiddenCount>0&&ctx==="jobs"){
    html+='<div class="show-all-wrap"><button class="show-all-btn" onclick="SHOW_ALL=false;render()">Hide lower-scored roles</button></div>';
  }
  wrap.innerHTML=html;
}

function tog(fp){EXP=EXP===fp?null:fp;render()}
function dismiss(fp){DISM[fp]=1;render()}

// --- Tab switching ---
document.querySelectorAll(".lane-tab").forEach(function(t){t.addEventListener("click",function(){
  document.querySelectorAll(".lane-tab").forEach(function(x){x.classList.remove("on")});t.classList.add("on");
  LANE=t.dataset.lane;EXP=null;SHOW_ALL=false;CITIES_ON.clear();TYPES_ON.clear();render();
})});
document.querySelectorAll(".sub-tab").forEach(function(t){t.addEventListener("click",function(){
  document.querySelectorAll(".sub-tab").forEach(function(x){x.classList.remove("on")});t.classList.add("on");
  SUB=t.dataset.sub;render();
})});
document.getElementById("fSearch").addEventListener("input",function(){SEARCH=this.value.toLowerCase().trim();render()});

// --- Init ---
(async function(){
  loadS();
  try{
    var [jr,mr]=await Promise.all([fetch("jobs.json"),fetch("meta.json")]);
    JOBS=await jr.json();META=await mr.json();
  }catch(x){
    document.getElementById("wrap").innerHTML='<div class="empty">Could not load jobs.json.</div>';
    return;
  }
  if(META.comp_floor)COMP_FLOOR=META.comp_floor;
  if(META.fash_floor)FASH_FLOOR=META.fash_floor;
  document.getElementById("hDate").textContent=META.export_date?new Date(META.export_date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"\u2014";
  document.getElementById("hCount").textContent=(META.compliance_visible||0)+(META.fashion_visible||0)||META.total_jobs||JOBS.length;
  render();
})();
</script>
</body>
</html>
