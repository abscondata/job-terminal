<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Terminal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;--surface:#161a22;--card:#1c2029;--border:#2a2e38;
  --text:#e8e6e1;--muted:#8a8680;--dim:#5a564f;
  --accent:#f5a623;--accent-dim:#c4841a;
  --green:#34d399;--green-bg:rgba(52,211,153,.12);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.12);
  --gray:#6b7280;--gray-bg:rgba(107,114,128,.10);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
}
body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,"Segoe UI",sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.topbar{
  position:sticky;top:0;z-index:10;
  background:rgba(12,15,20,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.brand{font-weight:700;font-size:17px;letter-spacing:.03em}
.brand span{color:var(--accent)}
.top-meta{color:var(--muted);font-size:12px}

.tabs{
  display:flex;gap:6px;padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.tab{
  padding:6px 14px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font:600 12px -apple-system,sans-serif;
  cursor:pointer;transition:all .15s;
}
.tab:hover{border-color:var(--dim);color:var(--text)}
.tab.on{background:var(--accent);color:#0c0f14;border-color:var(--accent)}

.filters{
  padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid var(--border);
}
.pill{
  padding:5px 12px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font:600 11px -apple-system,sans-serif;
  cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.04em;
}
.pill:hover{border-color:var(--dim);color:var(--text)}
.pill.on{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.08)}
.pill.green.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.pill.yellow.on{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)}
.pill.gray.on{border-color:var(--gray);color:var(--gray);background:var(--gray-bg)}
.search{
  flex:1;min-width:140px;padding:6px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font:13px -apple-system,sans-serif;
  outline:none;
}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--dim)}
select.city-sel{
  padding:5px 10px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font:12px -apple-system,sans-serif;
  outline:none;cursor:pointer;
}

.cards{padding:8px 16px 80px 16px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;
}
.card:hover{border-color:var(--dim)}
.card.expanded{border-color:var(--accent-dim)}
.card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.card-main{flex:1;min-width:0}
.card-title{font-weight:700;font-size:15px;line-height:1.3;word-wrap:break-word}
.card-company{color:var(--muted);font-size:12px;margin-top:2px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:999px;
  font:600 10px/1.6 -apple-system,sans-serif;text-transform:uppercase;letter-spacing:.04em;
}
.badge.apply{background:var(--green-bg);color:var(--green)}
.badge.maybe{background:var(--yellow-bg);color:var(--yellow)}
.badge.skip{background:var(--gray-bg);color:var(--gray)}
.badge.lane{background:rgba(139,92,246,.12);color:#a78bfa}
.badge.city{background:rgba(34,211,238,.10);color:#22d3ee}
.badge.world{background:rgba(96,165,250,.10);color:#60a5fa}
.card-rec{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.4}

.detail{
  display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);
}
.card.expanded .detail{display:block}
.detail-section{margin-bottom:10px}
.detail-label{
  font:700 10px/1.2 -apple-system,sans-serif;text-transform:uppercase;
  letter-spacing:.06em;color:var(--dim);margin-bottom:4px;
}
.detail-text{font-size:13px;color:var(--text);line-height:1.5}
.detail-text.risk{color:var(--red)}
.detail-text.fit{color:var(--green)}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{
  padding:7px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font:600 12px -apple-system,sans-serif;
  cursor:pointer;transition:all .15s;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0c0f14;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dim)}
.btn.danger{color:var(--red);border-color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}

.empty{
  text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;
}

.count-bar{
  padding:6px 16px;color:var(--dim);font-size:11px;
  border-bottom:1px solid var(--border);
}

@media(min-width:700px){
  .cards{max-width:720px;margin:0 auto}
  .topbar,.tabs,.filters,.count-bar{max-width:720px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="brand">Job <span>Terminal</span></div>
    <div class="top-meta">Exported: <span id="exportDate">-</span></div>
  </div>
  <div class="top-meta"><span id="totalCount">0</span> jobs loaded</div>
</div>

<div class="tabs">
  <button class="tab on" data-tab="jobs">Jobs</button>
  <button class="tab" data-tab="saved">Saved <span id="savedCount">(0)</span></button>
</div>

<div class="filters" id="filtersBar">
  <button class="pill green on" data-q="apply">Apply</button>
  <button class="pill yellow on" data-q="maybe">Maybe</button>
  <button class="pill gray" data-q="skip">Skip</button>
  <select class="city-sel" id="cityFilter">
    <option value="all">All Cities</option>
  </select>
  <input class="search" id="searchBox" type="text" placeholder="Search company, title, lane..." />
</div>

<div class="count-bar" id="countBar">Showing 0 jobs</div>

<div class="cards" id="content"></div>

<script>
var JOBS=[], META={}, SAVED=[], SAVED_SET={}, TAB="jobs", DISMISSED={}, EXPANDED=null;
var Q_FILTER={apply:true,maybe:true,skip:false}, CITY_FILTER="all", SEARCH="";

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(m){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m]||m})}

function loadSaved(){
  try{SAVED=JSON.parse(localStorage.getItem("jobengine_saved")||"[]")}catch(e){SAVED=[]}
  SAVED_SET={};
  for(var i=0;i<SAVED.length;i++) SAVED_SET[SAVED[i].fingerprint]=1;
  document.getElementById("savedCount").textContent="("+SAVED.length+")";
}

function persistSaved(){
  localStorage.setItem("jobengine_saved",JSON.stringify(SAVED));
  loadSaved();
}

function saveJob(fp){
  for(var i=0;i<JOBS.length;i++){
    if(JOBS[i].fingerprint===fp&&!SAVED_SET[fp]){
      SAVED.push({fingerprint:fp,saved_at:new Date().toISOString(),job:JOBS[i]});
      break;
    }
  }
  persistSaved();render();
}

function removeSaved(fp){
  SAVED=SAVED.filter(function(s){return s.fingerprint!==fp});
  persistSaved();render();
}

function dismissJob(fp){
  DISMISSED[fp]=1;render();
}

function toggleExpand(fp){
  EXPANDED=EXPANDED===fp?null:fp;render();
}

function buildCityOptions(){
  var counts={},sel=document.getElementById("cityFilter");
  for(var i=0;i<JOBS.length;i++){
    var c=JOBS[i].city_lane||"Unknown";
    counts[c]=(counts[c]||0)+1;
  }
  var keys=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]});
  for(var j=0;j<keys.length;j++){
    var opt=document.createElement("option");
    opt.value=keys[j];opt.textContent=keys[j]+" ("+counts[keys[j]]+")";
    sel.appendChild(opt);
  }
}

function matchesFilters(job){
  if(!Q_FILTER[job.queue_label]) return false;
  if(CITY_FILTER!=="all"&&(job.city_lane||"Unknown")!==CITY_FILTER) return false;
  if(SEARCH){
    var hay=((job.company||"")+" "+(job.title||"")+" "+(job.classification||"")+" "+(job.city_lane||"")+" "+(job.world_tier||"")+" "+(job.function_family||"")+" "+((job.opportunity_lanes||[]).join(" "))).toLowerCase();
    if(hay.indexOf(SEARCH)<0) return false;
  }
  return true;
}

function renderCard(job,context){
  var fp=job.fingerprint,isExp=EXPANDED===fp;
  var qClass=job.queue_label==="apply"?"apply":job.queue_label==="maybe"?"maybe":"skip";
  var qLabel=job.queue_label==="apply"?"Apply":job.queue_label==="maybe"?"Maybe":"Skip";
  var lanes=(job.opportunity_lanes||[]).slice(0,2);

  var html='<div class="card'+(isExp?" expanded":"")+'" onclick="toggleExpand(\''+esc(fp)+'\')">';
  html+='<div class="card-top"><div class="card-main">';
  html+='<div class="card-title">'+esc(job.title)+'</div>';
  html+='<div class="card-company">'+esc(job.company)+(job.location_text?" \u00b7 "+esc(job.location_text):"")+'</div>';
  html+='<div class="card-meta">';
  html+='<span class="badge '+qClass+'">'+qLabel+'</span>';
  if(job.city_lane&&job.city_lane!=="Unknown") html+='<span class="badge city">'+esc(job.city_lane)+'</span>';
  if(job.classification) html+='<span class="badge lane">'+esc(job.classification)+'</span>';
  if(job.world_tier&&job.world_tier!=="Unknown World") html+='<span class="badge world">'+esc(job.world_tier)+'</span>';
  html+='</div>';
  if(job.one_line_recommendation) html+='<div class="card-rec">'+esc(job.one_line_recommendation)+'</div>';
  html+='</div></div>';

  html+='<div class="detail">';
  if(job.why_surfaced) html+='<div class="detail-section"><div class="detail-label">Why It Surfaced</div><div class="detail-text">'+esc(job.why_surfaced)+'</div></div>';
  if(job.why_fit) html+='<div class="detail-section"><div class="detail-label">Why It Could Matter</div><div class="detail-text fit">'+esc(job.why_fit)+'</div></div>';
  if(job.path_logic) html+='<div class="detail-section"><div class="detail-label">Path Logic</div><div class="detail-text">'+esc(job.path_logic)+'</div></div>';
  if(job.main_risk) html+='<div class="detail-section"><div class="detail-label">Main Risk</div><div class="detail-text risk">'+esc(job.main_risk)+'</div></div>';
  if(job.biggest_resume_gap) html+='<div class="detail-section"><div class="detail-label">Biggest Gap</div><div class="detail-text">'+esc(job.biggest_resume_gap)+'</div></div>';
  if(job.slop_verdict) html+='<div class="detail-section"><div class="detail-label">Bridge or Slop</div><div class="detail-text">'+esc(job.slop_verdict)+'</div></div>';
  if(job.french_risk_label) html+='<div class="detail-section"><div class="detail-label">French</div><div class="detail-text">'+esc(job.french_risk_label)+'</div></div>';
  if(job.compensation_text) html+='<div class="detail-section"><div class="detail-label">Compensation</div><div class="detail-text">'+esc(job.compensation_text)+'</div></div>';
  if(job.function_family) html+='<div class="detail-section"><div class="detail-label">Function</div><div class="detail-text">'+esc(job.function_family)+'</div></div>';
  if(lanes.length) html+='<div class="detail-section"><div class="detail-label">Lanes</div><div class="detail-text">'+esc(lanes.join(", "))+'</div></div>';

  html+='<div class="detail-actions">';
  if(job.url) html+='<a class="btn primary" href="'+esc(job.url)+'" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Open</a>';

  if(context==="saved"){
    html+='<button class="btn danger" onclick="event.stopPropagation();removeSaved(\''+esc(fp)+'\')">Remove</button>';
  } else {
    if(!SAVED_SET[fp]) html+='<button class="btn" onclick="event.stopPropagation();saveJob(\''+esc(fp)+'\')">Save</button>';
    else html+='<button class="btn" disabled style="opacity:.4">Saved</button>';
    html+='<button class="btn" onclick="event.stopPropagation();dismissJob(\''+esc(fp)+'\')">Dismiss</button>';
  }
  html+='</div></div></div>';
  return html;
}

function render(){
  var el=document.getElementById("content");
  var countEl=document.getElementById("countBar");
  var filtersEl=document.getElementById("filtersBar");

  if(TAB==="saved"){
    filtersEl.style.display="none";
    if(!SAVED.length){
      el.innerHTML='<div class="empty">No saved jobs yet. Browse Jobs and tap Save.</div>';
      countEl.textContent="0 saved jobs";
      return;
    }
    var html="";
    for(var i=0;i<SAVED.length;i++) html+=renderCard(SAVED[i].job,"saved");
    el.innerHTML=html;
    countEl.textContent=SAVED.length+" saved job"+(SAVED.length===1?"":"s");
    return;
  }

  filtersEl.style.display="flex";
  var visible=[];
  for(var j=0;j<JOBS.length;j++){
    if(DISMISSED[JOBS[j].fingerprint]) continue;
    if(matchesFilters(JOBS[j])) visible.push(JOBS[j]);
  }

  if(!visible.length){
    el.innerHTML='<div class="empty">No jobs match your filters.</div>';
    countEl.textContent="0 jobs";
    return;
  }

  var html="";
  var limit=Math.min(visible.length,200);
  for(var k=0;k<limit;k++) html+=renderCard(visible[k],"jobs");
  if(visible.length>200) html+='<div class="empty">Showing first 200 of '+visible.length+' matches. Use filters to narrow.</div>';
  el.innerHTML=html;
  countEl.textContent="Showing "+Math.min(limit,visible.length)+" of "+visible.length+" jobs";
}

// Tab switching
document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on")});
    t.classList.add("on");
    TAB=t.dataset.tab;
    EXPANDED=null;
    render();
  });
});

// Queue pills
document.querySelectorAll(".pill[data-q]").forEach(function(p){
  p.addEventListener("click",function(){
    var q=p.dataset.q;
    Q_FILTER[q]=!Q_FILTER[q];
    p.classList.toggle("on");
    render();
  });
});

// City filter
document.getElementById("cityFilter").addEventListener("change",function(){
  CITY_FILTER=this.value;render();
});

// Search
document.getElementById("searchBox").addEventListener("input",function(){
  SEARCH=this.value.toLowerCase().trim();render();
});

// Load data
(async function(){
  try{
    var [jr,mr]=await Promise.all([fetch("jobs.json"),fetch("meta.json")]);
    JOBS=await jr.json();
    META=await mr.json();
  }catch(e){
    document.getElementById("content").innerHTML='<div class="empty">Failed to load jobs.json. Make sure you are serving this directory (e.g. python -m http.server).</div>';
    return;
  }
  document.getElementById("exportDate").textContent=META.export_date?new Date(META.export_date).toLocaleString():"-";
  document.getElementById("totalCount").textContent=META.total_jobs||JOBS.length;
  loadSaved();
  buildCityOptions();
  render();
})();
</script>
</body>
</html>
